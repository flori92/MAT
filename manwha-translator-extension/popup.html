<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manwha Auto Translator</title>
  <style>
    :root {
      --bg: #0f141a;
      --panel: #171d24;
      --panel-strong: #1d2530;
      --border: #2a3441;
      --text: #edf1f5;
      --muted: #93a0af;
      --accent: #d85c1a;
      --accent-hover: #bf4f15;
      --accent-soft: rgba(216, 92, 26, 0.12);
      --success: #2f9e5a;
      --danger: #d9534f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      min-height: 400px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    
    .header {
      margin-bottom: 20px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .header-logo {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 12px;
      flex: 0 0 auto;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }
    
    .header h1 {
      font-size: 20px;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    
    .header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .header-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }
    
    .status-card {
      background: var(--panel);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid var(--border);
    }
    
    .status-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    
    .status-value {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    
    .status-dot.inactive {
      background: var(--danger);
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 1px solid #b24c17;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 5px 16px rgba(0, 0, 0, 0.2);
    }
    
    .btn-secondary {
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: #232c37;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .settings {
      background: var(--panel);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid var(--border);
    }
    
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .setting-item:last-child {
      margin-bottom: 0;
    }
    
    .setting-label {
      font-size: 13px;
      color: #c7d0da;
    }
    
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: #46505c;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .toggle.active {
      background: var(--accent);
    }
    
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    
    .toggle.active::after {
      transform: translateX(20px);
    }
    
    select {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    
    select option {
      background: #11161c;
    }
    
    .stats {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }
    
    .progress-bar.active {
      display: block;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .info-box {
      background: var(--accent-soft);
      border: 1px solid rgba(216, 92, 26, 0.3);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: #f1bf9b;
      margin-top: 10px;
    }

    .section-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      margin-top: 15px;
    }

    .api-input {
      width: 100%;
      background: #121820;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-input:focus {
      border-color: var(--accent);
    }

    .api-input::placeholder {
      color: #697585;
    }

    .api-label {
      font-size: 11px;
      color: #b0bac6;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .api-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--danger);
    }

    .api-status.active {
      background: var(--success);
    }

    .engine-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(216, 92, 26, 0.14);
      color: #f4b38b;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <img class="header-logo" src="branding/mat-browser-source.png" alt="Logo MAT">
      <div class="header-copy">
        <h1>MAT</h1>
        <p>Manwha Auto Translator · EN → FR</p>
      </div>
    </div>
  </div>
  
  <div class="status-card">
    <div class="status-title">Statut</div>
    <div class="status-value">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Prêt à traduire</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  
  <div class="controls">
    <button class="btn btn-primary" id="translateBtn">
      <span>🔄</span> Traduire cette page
    </button>
    <button class="btn btn-secondary" id="autoTranslateBtn">
      <span>⚡</span> Traduction auto: <span id="autoStatus">OFF</span>
    </button>
    <button class="btn btn-secondary" id="resetBtn">
      <span>↩️</span> Réinitialiser
    </button>
  </div>
  
  <div class="settings">
    <div class="setting-item">
      <span class="setting-label">Mode d'affichage</span>
      <select id="displayMode">
        <option value="overlay">Superposé</option>
        <option value="replace">Remplacer</option>
        <option value="bubble">Bulles FR</option>
      </select>
    </div>
    <div class="setting-item">
      <span class="setting-label">Moteur OCR</span>
      <select id="ocrEngine">
        <option value="auto">🧩 Stack manga (backend)</option>
        <option value="manga-stack">🧩 Stack manga forcee</option>
        <option value="paddle">📘 PaddleOCR</option>
        <option value="mangaocr">🗾 MangaOCR refine</option>
        <option value="doctr">📄 docTR</option>
        <option value="gemini">✨ Gemini Vision (secours)</option>
        <option value="openai">🧠 OpenAI Vision (secours)</option>
      </select>
    </div>
    <div class="setting-item">
      <span class="setting-label">Conserver l'original</span>
      <div class="toggle" id="keepOriginal"></div>
    </div>
  </div>

  <div class="section-title">🔌 Backend</div>
  <div class="settings">
    <div class="api-label">
      <span class="api-status" id="backendStatus"></span>
      API backend <span class="engine-badge">OCR + traduction</span>
    </div>
    <input type="text" class="api-input" id="backendUrl" 
           placeholder="http://127.0.0.1:8787" autocomplete="off">

    <div class="api-label" style="margin-top: 6px;">
      Jeton backend <span class="engine-badge">optionnel</span>
    </div>
    <input type="password" class="api-input" id="backendToken" 
           placeholder="Bearer token" autocomplete="off">

    <div class="stats" style="margin-top: 10px; padding-top: 10px;">
      Les clés Gemini/OpenAI vivent côté backend, pas dans l’extension.
    </div>
  </div>
  
  <div class="info-box" id="infoBox" style="display: none;"></div>
  
  <div class="stats">
    Images détectées: <span id="imageCount">0</span> | 
    Traductions: <span id="translatedCount">0</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
